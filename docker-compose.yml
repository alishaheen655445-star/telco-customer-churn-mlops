services:

  api:
    build:
      context: .
      dockerfile: src/api/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  streamlit:
    build:
      context: .
      dockerfile: src/ui/Dockerfile
    ports:

      - "8501:8501"
    depends_on:
      - api
    volumes:
      - .:/app